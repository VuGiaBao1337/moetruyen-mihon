name: CI Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build & Verify Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for JitPack compatibility or Spotless checks

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Archive Build Artifacts (Libraries/AARs)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: tachiyomix-build-artifacts
          path: |
            library/build/outputs/aar/*.aar
            library/build/libs/*.jar
          if-no-files-found: warn
